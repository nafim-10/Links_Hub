<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Links Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--bg:#0d0d14;--sur:#14141f;--sur2:#1c1c2a;--sur3:#24243a;--bdr:#2e2e42;--txt:#e2e2f0;--txt2:#9090b0;--txt3:#555570;--acc:#7c6bff;--glow:rgba(124,107,255,0.2);--star:#f5a623;--grn:#22d3a0;--r:12px;}
body.light{--bg:#f0f0f8;--sur:#fff;--sur2:#f0f0f8;--sur3:#e4e4f0;--bdr:#d0d0e4;--txt:#111128;--txt2:#555578;--txt3:#9999bb;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px);background-size:40px 40px;}
body.light::before{background-image:linear-gradient(rgba(0,0,0,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,0.035) 1px,transparent 1px);}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px);opacity:0.12;animation:orbFloat 14s cubic-bezier(0.45,0.05,0.55,0.95) infinite;will-change:transform;}
.orb1{width:400px;height:400px;background:#7c6bff;top:-100px;left:-100px;animation-delay:0s;}
.orb2{width:300px;height:300px;background:#22d3a0;bottom:-80px;right:-80px;animation-delay:5s;}
.orb3{width:200px;height:200px;background:#f5a623;top:40%;left:60%;animation-delay:9s;}
body.light .orb{opacity:0.06;}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(30px,20px) scale(1.08);}}
#hdr{position:sticky;top:0;z-index:100;height:60px;background:rgba(13,13,20,0.93);backdrop-filter:blur(24px);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;padding:0 14px;transition:height .4s,box-shadow .4s,background .4s;}
body.light #hdr{background:rgba(240,240,248,0.96);}
.brand{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0;}
.brand-logo{width:36px;height:36px;border-radius:9px;object-fit:cover;flex-shrink:0;box-shadow:0 0 0 2px rgba(124,107,255,0.4);transition:box-shadow .4s,transform .3s cubic-bezier(.34,1.56,.64,1);animation:logoPulse 3s ease-in-out infinite;}
@keyframes logoPulse{0%,100%{box-shadow:0 0 0 2px rgba(124,107,255,0.4);}50%{box-shadow:0 0 0 4px rgba(124,107,255,0.7),0 0 20px rgba(124,107,255,0.3);}}
.brand:hover .brand-logo{box-shadow:0 0 0 3px var(--acc),0 0 18px var(--acc);transform:scale(1.07);}
.brand-text .bnm{font-size:15px;font-weight:700;color:var(--txt);line-height:1.2;}
.brand-text .bsub{font-size:9px;color:var(--txt3);}
#sw{flex:1;max-width:360px;margin-left:auto;position:relative;}
#sw i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txt3);font-size:12px;pointer-events:none;}
#si{width:100%;border-radius:9px;padding:9px 12px 9px 30px;font-size:14px;font-family:'Inter',sans-serif;outline:none;background:#1c1c2a;border:1.5px solid #3a3a55;color:#e2e2f0;caret-color:#e2e2f0;transition:border-color .3s,box-shadow .3s,transform .25s cubic-bezier(.34,1.56,.64,1);}
#si:focus{border-color:#7c6bff;box-shadow:0 0 0 3px rgba(124,107,255,0.18);transform:scaleX(1.012);}
#si::placeholder{color:#555570;}
body.light #si{background:#fff;border-color:#d0d0e4;color:#111128;caret-color:#111128;}
body.light #si::placeholder{color:#9999bb;}
.hbs{display:flex;gap:6px;margin-left:8px;flex-shrink:0;}
.hb{width:36px;height:36px;flex-shrink:0;border:1.5px solid var(--bdr);background:var(--sur2);border-radius:8px;color:var(--txt2);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none;transition:border-color .3s,color .3s,background .3s,transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .3s;}
.hb:hover{border-color:var(--acc);color:var(--acc);transform:scale(1.1);box-shadow:0 4px 12px rgba(124,107,255,0.2);}
.hb:active{transform:scale(0.95);}
.hb.fon{border-color:var(--star);color:var(--star);background:rgba(245,166,35,0.1);}
#main{position:relative;z-index:1;padding:14px;max-width:900px;margin:0 auto;}
.stats{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;}
.stat{display:flex;align-items:center;gap:6px;padding:5px 12px;background:var(--sur);border:1px solid var(--bdr);border-radius:20px;font-size:12px;color:var(--txt2);animation:fadeUp .5s ease both;position:relative;overflow:hidden;}
.stat:nth-child(1){animation-delay:.05s;}.stat:nth-child(2){animation-delay:.1s;}.stat:nth-child(3){animation-delay:.15s;}
.stat i{color:var(--acc);font-size:11px;}.stat b{color:var(--txt);}
.stat::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.07),transparent);animation:shimmer 3s ease-in-out infinite;}
@keyframes shimmer{0%{left:-100%;}60%,100%{left:120%;}}
.cat{margin-bottom:7px;animation:catEntrance .5s cubic-bezier(.4,0,.2,1) both;}.cat.hidden{display:none!important;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes catEntrance{from{opacity:0;transform:translateY(20px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.chd{display:flex;align-items:center;gap:9px;padding:12px 14px;background:var(--sur);border:1.5px solid var(--bdr);border-radius:var(--r);cursor:pointer;user-select:none;position:relative;overflow:hidden;transition:border-color .35s,background .35s,transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .35s;}
.chd:hover{border-color:#4a4a6a;background:#17172a;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.25);}
.chd:active{transform:scale(0.99) translateY(0);}
body.light .chd:hover{border-color:#b0b0d0;background:#f8f8fc;box-shadow:0 4px 16px rgba(0,0,0,0.07);}
.cat.open .chd{border-radius:var(--r) var(--r) 0 0;border-bottom-color:transparent;border-color:var(--acc);}
.chd::after{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(90deg,transparent,rgba(124,107,255,0.08),transparent);transform:translateX(-100%);transition:transform .5s;pointer-events:none;}
.chd:hover::after{transform:translateX(100%);}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:transform .3s cubic-bezier(.34,1.56,.64,1);}
.cat.open .cdot{transform:scale(1.3);}
.cico{font-size:15px;display:inline-block;transition:transform .3s cubic-bezier(.34,1.56,.64,1),filter .3s;}
.chd:hover .cico{transform:scale(1.15);}
.cat.open .cico{animation:emojiSpin .5s cubic-bezier(.34,1.56,.64,1) forwards,emojiBounce 2s ease-in-out .5s infinite;filter:drop-shadow(0 0 6px rgba(124,107,255,0.8)) drop-shadow(0 0 12px rgba(124,107,255,0.4));}
@keyframes emojiSpin{0%{transform:rotate(0deg) scale(1);}40%{transform:rotate(-20deg) scale(1.35);}70%{transform:rotate(12deg) scale(1.2);}100%{transform:rotate(0deg) scale(1.25);}}
@keyframes emojiBounce{0%,100%{transform:scale(1.25) translateY(0);}50%{transform:scale(1.25) translateY(-3px);}}
.cnm{font-size:13px;font-weight:600;flex:1;}.cnum{font-size:10px;color:var(--txt3);background:var(--sur2);padding:2px 7px;border-radius:10px;}
.carr{color:var(--txt3);font-size:11px;transition:transform .35s cubic-bezier(.4,0,.2,1);}.cat.open .carr{transform:rotate(180deg);}
.cbody{display:none;border:1.5px solid var(--acc);border-top:none;border-radius:0 0 var(--r) var(--r);background:var(--sur);padding:5px;overflow:hidden;}
.cat.open .cbody{display:flex!important;flex-direction:column;gap:2px;animation:slideDown .38s cubic-bezier(.4,0,.2,1) both;}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
.lr{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;border:1px solid transparent;opacity:0;animation:rowIn .35s cubic-bezier(.4,0,.2,1) forwards;position:relative;transition:background .25s,border-color .25s,transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .25s;}
.lr:hover{background:var(--sur2);border-color:var(--bdr);transform:translateX(5px);box-shadow:0 2px 8px rgba(0,0,0,0.15);}
.lr:active{transform:scale(0.98) translateX(0);}.lr.hide{display:none!important;}
@keyframes rowIn{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}
.lfav{width:28px;height:28px;flex-shrink:0;border-radius:7px;background:var(--sur3);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;overflow:hidden;color:var(--txt3);font-size:11px;transition:transform .25s cubic-bezier(.34,1.56,.64,1),border-color .25s;}
.lr:hover .lfav{transform:scale(1.08);border-color:var(--acc);}
.lfav img{width:100%;height:100%;object-fit:cover;}
.lnm{flex:1;min-width:0;font-size:13px;font-weight:500;color:var(--txt);text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;transition:color .25s;position:relative;}
.lnm::after{content:'';position:absolute;bottom:-1px;left:0;width:0;height:1.5px;background:linear-gradient(90deg,var(--acc),#22d3a0);transition:width .3s;border-radius:2px;}
.lr:hover .lnm::after{width:100%;}
.lnm:hover{color:var(--acc);}
.lacts{display:flex;gap:4px;flex-shrink:0;}
.la{width:32px;height:32px;flex-shrink:0;border:1.5px solid var(--bdr);background:var(--sur2);border-radius:7px;color:var(--txt2);font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .25s,color .25s,border-color .25s,transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .25s;}
.la:hover{background:var(--acc);color:#fff;border-color:var(--acc);transform:scale(1.12);box-shadow:0 4px 12px rgba(124,107,255,0.35);}
.la:active{transform:scale(0.92);}
.la.strd{color:var(--star);border-color:rgba(245,166,35,0.5);}
.la.strd:hover{background:var(--star);border-color:var(--star);color:#fff;box-shadow:0 4px 12px rgba(245,166,35,0.35);}
#nores{display:none;text-align:center;padding:50px 20px;color:var(--txt3);}
#nores.on{display:block;}
#nores i{font-size:34px;display:block;margin-bottom:10px;}
#footer{position:relative;z-index:1;text-align:center;padding:20px 14px;margin-top:10px;border-top:1px solid var(--bdr);color:var(--txt3);font-size:12px;}
#footer span{color:var(--txt2);}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(16px) scale(0.95);background:#1a1a2e;border:1px solid rgba(124,107,255,0.4);color:#fff;padding:10px 20px;border-radius:26px;font-size:13px;z-index:9999;opacity:0;pointer-events:none;transition:opacity .3s,transform .35s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;gap:8px;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,0.3);}
body.light #toast{background:#fff;color:#111;border-color:rgba(124,107,255,0.3);}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}
#toast i{color:var(--grn);}
#gotop{position:fixed;bottom:20px;right:16px;width:42px;height:42px;background:var(--acc);color:#fff;border:none;border-radius:12px;font-size:15px;cursor:pointer;z-index:400;display:none;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(124,107,255,0.35);transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .25s;}
#gotop.on{display:flex;animation:gotopIn .35s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes gotopIn{from{opacity:0;transform:translateY(10px) scale(0.8);}to{opacity:1;transform:translateY(0) scale(1);}}
#gotop:hover{transform:translateY(-4px) scale(1.08);}
#gotop:active{transform:scale(0.92);}
@keyframes pulse{0%{transform:scale(1);}50%{transform:scale(1.35);}100%{transform:scale(1);}}
.la.pulse{animation:pulse .3s ease;}
@keyframes starBurst{0%{transform:scale(1);}30%{transform:scale(1.65) rotate(-12deg);}60%{transform:scale(0.88) rotate(6deg);}100%{transform:scale(1) rotate(0);}}
.la.burst{animation:starBurst .45s cubic-bezier(.34,1.56,.64,1);}
@keyframes copyFlash{0%{background:var(--grn);color:#fff;border-color:var(--grn);transform:scale(1.1);}50%{transform:scale(1.05);}100%{background:var(--sur2);color:var(--txt2);border-color:var(--bdr);transform:scale(1);}}
.la.copied{animation:copyFlash .7s cubic-bezier(.4,0,.2,1) forwards;}
#hdr.shrunken{height:50px;box-shadow:0 2px 24px rgba(0,0,0,0.45);}
.ripple-effect{position:absolute;border-radius:50%;background:rgba(124,107,255,0.35);transform:scale(0);animation:rippleAnim .6s linear;pointer-events:none;}
@keyframes rippleAnim{to{transform:scale(4);opacity:0;}}
.d1{background:#7c6bff}.d2{background:#ff6b6b}.d3{background:#ffd93d}.d4{background:#22d3a0}
.d5{background:#ff9f43}.d6{background:#48dbfb}.d7{background:#ff9ff3}.d8{background:#54a0ff}
.d9{background:#5f27cd}.d10{background:#00d2d3}.d11{background:#ff6b81}.d12{background:#2ed573}
.d13{background:#eccc68}.d14{background:#a29bfe}.d15{background:#fd79a8}
#particleCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.45;}
body.light #particleCanvas{opacity:0.2;}
body,body *{transition-property:background-color,border-color,color,box-shadow;transition-duration:.35s;transition-timing-function:cubic-bezier(.4,0,.2,1);}
.la,.hb,.lr,.chd,.brand-logo,.lnm,.carr,.cdot,.cico,.lfav{transition-property:background,border-color,color,transform,box-shadow,opacity;}
</style>
</head>

(function(){var c=document.getElementById('particleCanvas');var ctx=c.getContext('2d');var W,H,particles=[];function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}resize();window.addEventListener('resize',resize);var colors=['#7c6bff','#22d3a0','#f5a623','#ff6b6b','#48dbfb'];function Particle(){this.x=Math.random()*W;this.y=Math.random()*H;this.r=Math.random()*1.5+0.4;this.dx=(Math.random()-.5)*0.3;this.dy=(Math.random()-.5)*0.3;this.alpha=Math.random()*0.5+0.1;this.color=colors[Math.floor(Math.random()*colors.length)];}Particle.prototype.update=function(){this.x+=this.dx;this.y+=this.dy;if(this.x<0)this.x=W;if(this.x>W)this.x=0;if(this.y<0)this.y=H;if(this.y>H)this.y=0;};for(var i=0;i<80;i++)particles.push(new Particle());function draw(){ctx.clearRect(0,0,W,H);for(var i=0;i<particles.length;i++){for(var j=i+1;j<particles.length;j++){var dx=particles[i].x-particles[j].x;var dy=particles[i].y-particles[j].y;var dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.strokeStyle='rgba(124,107,255,'+(0.06*(1-dist/100))+')';ctx.lineWidth=0.6;ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.stroke();}}}particles.forEach(function(p){p.update();ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.color;ctx.globalAlpha=p.alpha;ctx.fill();ctx.globalAlpha=1;});requestAnimationFrame(draw);}draw();})();

document.addEventListener('click',function(e){var la=e.target.closest('.la[title="Favorite"]');if(!la)return;la.classList.add('burst');setTimeout(function(){la.classList.remove('burst');},400);});
document.addEventListener('click',function(e){var cb=e.target.closest('.la[title="Copy"]');if(!cb)return;cb.classList.add('copied');var old=cb.innerHTML;cb.innerHTML='<i class="fas fa-check"></i>';setTimeout(function(){cb.classList.remove('copied');cb.innerHTML=old;},700);});
(function(){var tx1=0,ty1=0,tx2=0,ty2=0,tx3=0,ty3=0;var cx1=0,cy1=0,cx2=0,cy2=0,cx3=0,cy3=0;var mx=0,my=0;document.addEventListener('mousemove',function(e){mx=e.clientX/window.innerWidth-.5;my=e.clientY/window.innerHeight-.5;});function lerp(a,b,t){return a+(b-a)*t;}function animOrbs(){tx1=mx*28;ty1=my*18;tx2=mx*-18;ty2=my*-13;tx3=mx*14;ty3=my*22;cx1=lerp(cx1,tx1,0.05);cy1=lerp(cy1,ty1,0.05);cx2=lerp(cx2,tx2,0.05);cy2=lerp(cy2,ty2,0.05);cx3=lerp(cx3,tx3,0.05);cy3=lerp(cy3,ty3,0.05);var o1=document.querySelector('.orb1');var o2=document.querySelector('.orb2');var o3=document.querySelector('.orb3');if(o1)o1.style.transform='translate('+cx1+'px,'+cy1+'px)';if(o2)o2.style.transform='translate('+cx2+'px,'+cy2+'px)';if(o3)o3.style.transform='translate('+cx3+'px,'+cy3+'px)';requestAnimationFrame(animOrbs);}animOrbs();})();
(function(){var cursor=document.createElement('div');cursor.id='cursorGlow';cursor.style.cssText='position:fixed;width:220px;height:220px;border-radius:50%;pointer-events:none;z-index:0;background:radial-gradient(circle,rgba(124,107,255,0.08) 0%,transparent 70%);transform:translate(-50%,-50%);left:-300px;top:-300px;';document.body.appendChild(cursor);var cx=-300,cy=-300,tx=-300,ty=-300;document.addEventListener('mousemove',function(e){tx=e.clientX;ty=e.clientY;});function animCursor(){cx+=(tx-cx)*0.1;cy+=(ty-cy)*0.1;cursor.style.left=cx+'px';cursor.style.top=cy+'px';requestAnimationFrame(animCursor);}animCursor();})();
</script>
